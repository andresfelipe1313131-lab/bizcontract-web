<script>
    const SUPABASE_URL = "https://gbonjfnznarifhyuzanv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KYtURs5rQyBayCWpEo3A8g_a7PPqHH4";

    let _supabase;
    let currentUser = null;
    let userProfileCache = {};
    let authMode = 'login';

    try {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true,  // Necesario para OAuth callback
                flowType: 'pkce'           // Más seguro que implicit flow
            }
        });
    } catch (e) {
        console.error("Error al conectar Supabase", e);
    }

    function showNotification(message, type = 'success') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 50);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
    }

    // ============================================================
    // INICIALIZACIÓN Y MANEJO DE SESIÓN
    // ============================================================
    window.onload = async function () {
        if (!_supabase) {
            showNotification("Error de conexión con el servidor", "danger");
            return;
        }

        // Detectar retorno de OAuth (Google) — limpia el hash del URL
        const hash = window.location.hash;
        if (hash && (hash.includes('access_token') || hash.includes('error'))) {
            // Supabase procesa automáticamente; solo limpiamos la URL
            history.replaceState(null, '', window.location.pathname);
        }

        // Verificar sesión existente al cargar
        const { data: { session } } = await _supabase.auth.getSession();
        await handleSessionChange(session);

        // Escuchar cambios de auth
        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                await handleSessionChange(session);
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                userProfileCache = {};
                document.getElementById('view-auth').style.display = 'flex';
                document.getElementById('app-workspace').style.display = 'none';
            }
        });
    };

    async function handleSessionChange(session) {
        if (session && session.user) {
            currentUser = session.user;
            await syncUserProfile();
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('app-workspace').style.display = 'flex';
            filterProjectsEngine();
        } else {
            currentUser = null;
            document.getElementById('view-auth').style.display = 'flex';
            document.getElementById('app-workspace').style.display = 'none';
        }
    }

    // ============================================================
    // GOOGLE OAUTH — MEJORADO
    // ============================================================
    async function handleGoogleLogin() {
        try {
            // Construir redirect URL exacto (sin hash, sin query)
            const redirectUrl = window.location.origin + window.location.pathname;

            const { data, error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: redirectUrl,
                    queryParams: {
                        access_type: 'offline',
                        prompt: 'consent'
                    }
                }
            });
            if (error) throw error;
            // El navegador redirige automáticamente a Google
        } catch (e) {
            showNotification("Error con Google: " + e.message, "danger");
        }
    }

    function toggleAuthMode(e) {
        e.preventDefault();
        authMode = (authMode === 'login') ? 'register' : 'login';
        document.getElementById('auth-title').innerText = authMode === 'login' ? 'Ingreso Operativo' : 'Registro de Nueva Empresa';
        document.getElementById('auth-btn').innerText = authMode === 'login' ? 'Iniciar Sesión' : 'Crear Cuenta';
        document.getElementById('auth-toggle').innerText = authMode === 'login' ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión';
    }

    async function handleAuthSubmit(event) {
        event.preventDefault();
        const email = document.getElementById('auth-email').value.trim().toLowerCase();
        const password = document.getElementById('auth-pass').value;
        const btn = document.getElementById('auth-btn');

        // Validaciones cliente
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showNotification("Correo inválido", "danger"); return;
        }
        if (password.length < 8) {
            showNotification("La contraseña debe tener mínimo 8 caracteres", "danger"); return;
        }

        try {
            btn.innerText = 'Procesando...';
            btn.disabled = true;

            if (authMode === 'login') {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    if (error.message.includes("Email not confirmed")) {
                        throw new Error("⚠️ Debes verificar tu correo antes de ingresar.");
                    }
                    if (error.message.includes("Invalid login")) {
                        throw new Error("Credenciales incorrectas.");
                    }
                    throw error;
                }
            } else {
                const { data, error } = await _supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        emailRedirectTo: window.location.origin + window.location.pathname
                    }
                });
                if (error) throw error;
                showNotification("✅ Cuenta creada. Revisa tu correo para confirmar.", "warning");
                authMode = 'login';
                document.getElementById('auth-title').innerText = 'Ingreso Operativo';
                document.getElementById('auth-btn').innerText = 'Iniciar Sesión';
            }
        } catch (e) {
            showNotification(e.message, "danger");
        } finally {
            btn.innerText = authMode === 'login' ? 'Iniciar Sesión' : 'Crear Cuenta';
            btn.disabled = false;
        }
    }

    async function handleLogout() {
        try {
            if (_supabase) await _supabase.auth.signOut();
        } catch (err) {
            console.error("Error signing out", err);
        } finally {
            currentUser = null;
            userProfileCache = {};
            window.location.href = window.location.origin + window.location.pathname;
        }
    }

    // ============================================================
    // PERFIL — usa upsert para crear si no existe
    // ============================================================
    async function syncUserProfile() {
        if (!currentUser) return;

        // maybeSingle() NO falla si no hay registro
        let { data, error } = await _supabase
            .from('perfiles')
            .select('*')
            .eq('id', currentUser.id)
            .maybeSingle();

        if (error) {
            console.error("Error cargando perfil:", error);
            showNotification("No se pudo cargar el perfil", "danger");
            return;
        }

        // Si no existe perfil, lo creamos automáticamente
        if (!data) {
            const newProfile = {
                id: currentUser.id,
                email: currentUser.email,
                razon_social: currentUser.user_metadata?.full_name || currentUser.email.split('@')[0],
                is_pro: false,
                created_at: new Date().toISOString()
            };
            const { data: inserted, error: insertError } = await _supabase
                .from('perfiles')
                .insert([newProfile])
                .select()
                .single();
            if (insertError) {
                console.error("Error creando perfil:", insertError);
                return;
            }
            data = inserted;
        }

        userProfileCache = data;
        document.getElementById('profile-razon-social').value = data.razon_social || '';
        document.getElementById('profile-nit').value = data.nit || '';
        document.getElementById('profile-phone').value = data.phone || '';
        document.getElementById('profile-web').value = data.web || '';

        if (data.is_pro) {
            const badge = document.getElementById('account-status-badge');
            badge.className = "live-badge pro-badge";
            badge.innerText = "⭐ NODO CORPORATE PRO ACTIVO";
        }
        document.getElementById('session-user-indicator').innerText =
            `EMPRESA: ${userProfileCache.razon_social || currentUser.email}`;
    }

    async function saveProfileData(event) {
        event.preventDefault();
        const updates = {
            razon_social: document.getElementById('profile-razon-social').value.trim(),
            nit: document.getElementById('profile-nit').value.trim(),
            phone: document.getElementById('profile-phone').value.trim(),
            web: document.getElementById('profile-web').value.trim(),
            updated_at: new Date().toISOString()
        };
        const { error } = await _supabase.from('perfiles').update(updates).eq('id', currentUser.id);
        if (error) {
            showNotification("Error al guardar: " + error.message, "danger");
        } else {
            showNotification("Perfil actualizado", "success");
            await syncUserProfile();
        }
    }

    // ============================================================
    // PROYECTOS
    // ============================================================
    async function filterProjectsEngine() {
        const search = document.getElementById('filter-search')?.value.toLowerCase() || '';
        const category = document.getElementById('filter-category')?.value || 'Todas';
        const type = document.getElementById('filter-type')?.value || 'Todos';

        let query = _supabase.from('proyectos').select('*').order('created_at', { ascending: false });
        if (category !== 'Todas') query = query.eq('categoria', category);
        if (type !== 'Todos') query = query.eq('modalidad', type);

        const { data: proyectos, error } = await query;
        const container = document.getElementById('projects-container');
        if (!container) return;

        if (error) {
            container.innerHTML = `<p style="color:var(--danger)">Error al cargar: ${error.message}</p>`;
            return;
        }

        const filtered = (proyectos || []).filter(p =>
            !search || p.titulo.toLowerCase().includes(search) || p.descripcion.toLowerCase().includes(search)
        );

        container.innerHTML = '';
        if (filtered.length === 0) {
            container.innerHTML = `<p>No hay requerimientos que coincidan.</p>`;
            return;
        }
        filtered.forEach(p => {
            container.innerHTML += `
                <div class="project-card">
                    <div class="project-header"><span>${p.empresa || 'Empresa'}</span><span>${new Date(p.created_at).toLocaleDateString()}</span></div>
                    <h4 class="project-title">${escapeHtml(p.titulo)}</h4>
                    <div class="project-meta">
                        <span class="role-tag">${escapeHtml(p.categoria)}</span>
                        <span class="role-tag">${escapeHtml(p.modalidad)}</span>
                    </div>
                    <p>${escapeHtml(p.descripcion)}</p>
                    <div class="project-footer"><strong>${escapeHtml(p.presupuesto)}</strong></div>
                </div>`;
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    async function handleCreateProjectSubmit(event) {
        event.preventDefault();
        if (!currentUser) { showNotification("Sesión expirada", "danger"); return; }

        const { error } = await _supabase.from('proyectos').insert([{
            user_id: currentUser.id,
            titulo: document.getElementById('p-title').value.trim(),
            categoria: document.getElementById('p-category').value,
            modalidad: document.getElementById('p-type').value,
            presupuesto: document.getElementById('p-budget').value.trim(),
            descripcion: document.getElementById('p-desc').value.trim(),
            empresa: userProfileCache.razon_social || currentUser.email
        }]);
        if (error) {
            showNotification("Error al publicar: " + error.message, "danger");
        } else {
            showNotification("Publicado correctamente", "success");
            switchView('explorar');
        }
    }

    // ============================================================
    // PASARELAS DE PAGO — INTEGRACIÓN REAL
    // ============================================================
    async function triggerPayment(gateway) {
        if (!currentUser) { showNotification("Sesión requerida", "danger"); return; }

        try {
            showNotification(`Generando orden segura con ${gateway}...`, "warning");

            // Llamar a Edge Function de Supabase que crea la orden del lado del servidor
            // Esto evita que el cliente marque is_pro=true directamente (inseguro)
            const { data, error } = await _supabase.functions.invoke('create-payment', {
                body: {
                    gateway: gateway,            // 'mercadopago' o 'paypal'
                    user_id: currentUser.id,
                    email: currentUser.email,
                    plan: 'pro_monthly',
                    amount: 49,
                    currency: 'USD'
                }
            });

            if (error) throw error;
            if (!data?.checkout_url) throw new Error("No se obtuvo URL de pago");

            // Redirigir al checkout real
            window.location.href = data.checkout_url;

        } catch (e) {
            console.error(e);
            showNotification("Error generando pago: " + e.message, "danger");
        }
    }

    function switchView(viewName) {
        document.querySelectorAll('.view-section, .menu-item').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + viewName).classList.add('active');
        if (document.getElementById('menu-' + viewName)) document.getElementById('menu-' + viewName).classList.add('active');
    }
</script>
